<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flight Accident Prediction</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0b2f; /* Dark blue background matching home page */
            color: #ffffff; /* White text for contrast */
            background-image: url("{{ url_for('static', filename='img/ai-006.jpg') }}"); /* Background image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(12, 11, 47, 0.8); /* Dark overlay for readability */
            z-index: -1;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.05); /* Slightly transparent white for the form card */
            backdrop-filter: blur(5px); /* Frosted glass effect */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border */
        }
        .form-input {
            background-color: rgba(255, 255, 255, 0.1); /* Slightly transparent input background */
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff; /* White text in input fields */
        }
        .form-input::placeholder {
            color: #a0aec0; /* Lighter placeholder text */
        }
        .form-input:focus {
            border-color: #00ffff; /* Cyan focus border */
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.15); /* Slightly more opaque on focus */
        }
        .login-button {
            background: linear-gradient(to right, #ff00ff, #da00ff); /* Pink gradient button */
            transition: all 0.3s ease;
        }
        .login-button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .back-link {
            color: #00ffff; /* Cyan link color */
        }
        .back-link:hover {
            color: #00bfff; /* Darker cyan on hover */
        }
        /* Custom style for the image to make it 1.2 times bigger */
        .flight-image {
            width: 100%; /* Start with 100% of its container */
            height: auto; /* Maintain aspect ratio */
            transform: scale(1.2); /* Scale it up by 1.2 times */
            object-fit: contain; /* Ensure it fits within its bounds without cropping */
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">
    <div class="flex flex-col md:flex-row items-center justify-center max-w-4xl w-full p-4 md:p-0">
        <!-- Image Section (Left side) - Increased width for the image container -->
        <div class="md:w-3/5 flex justify-center items-center p-4">
            <img src="{{ url_for('static', filename='img/login.png') }}" alt="Flight Illustration" class="flight-image">
        </div>

        <!-- Login Form Section (Right side) - Reduced width to compensate for image -->
        <div class="login-container p-8 rounded-lg shadow-xl max-w-sm w-full md:w-2/5 mt-8 md:mt-0 md:ml-8">
            <h2 class="text-3xl font-bold text-white text-center mb-6">Login</h2>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-4">
                        {% for category, message in messages %}
                            <div class="p-3 rounded-md text-sm {% if category == 'danger' %}bg-red-700 text-white{% elif category == 'success' %}bg-green-700 text-white{% else %}bg-blue-700 text-white{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-4">
                    <label for="username" class="block text-white text-sm font-semibold mb-2">Username:</label>
                    <input type="text" id="username" name="username" required
                           class="form-input shadow-sm appearance-none rounded-lg w-full py-2 px-3 leading-tight focus:outline-none focus:ring-2 focus:border-transparent">
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-white text-sm font-semibold mb-2">Password:</label>
                    <input type="password" id="password" name="password" required
                           class="form-input shadow-sm appearance-none rounded-lg w-full py-2 px-3 mb-3 leading-tight focus:outline-none focus:ring-2 focus:border-transparent">
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit"
                            class="login-button text-white font-bold py-2 px-4 rounded-lg focus:outline-none focus:shadow-outline transform hover:scale-105">
                        Login
                    </button>
                    <a href="{{ url_for('home') }}"
                       class="back-link inline-block align-baseline font-bold text-sm hover:underline">
                        Back to Home
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
